name: Application

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'

permissions:
  id-token: write
  contents: read

env:
  FUNCTION_APP_NAME: func-enquiryhub-dev
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Gate ──────────────────────────────────────────────────────────────────
  # Pauses the workflow for manual approval before any deployment runs.
  # The `environment: production` gate requires a reviewer to approve in
  # GitHub → Environments → production before the deploy jobs start.
  #
  # Setup: GitHub → Settings → Environments → New environment → "production"
  #        Add required reviewers before enabling branch protection.
  gate:
    name: Approve Deployment
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "Deployment approved — proceeding with Functions and SWA deploy."

  # ── Deploy: Azure Functions ───────────────────────────────────────────────
  deploy-functions:
    name: Deploy Azure Functions
    needs: gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install dependencies
        run: pip install -r src/functions/requirements.txt --target src/functions/.python_packages/lib/site-packages

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.FUNCTION_APP_NAME }}
          package: src/functions
          scm-do-build-during-deployment: false
          enable-oryx-build: false

  # ── Deploy: Static Web App ────────────────────────────────────────────────
  deploy-web:
    name: Deploy Static Web App
    needs: gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Azure Static Web Apps
        uses: azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: src/web
          output_location: ""
          skip_api_build: true
