<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enquiry Hub Assistant</title>
  <style>
    /* ── Reset & base ────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Shell ───────────────────────────────────────────────────────────── */
    header {
      width: 100%;
      background: #1a1a2e;
      color: #fff;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
      flex-shrink: 0;
    }

    header svg { flex-shrink: 0; }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: .02em;
    }

    header .subtitle {
      margin-left: auto;
      font-size: .75rem;
      opacity: .75;    /* raised from .6 — meets WCAG AA on dark header */
      white-space: nowrap;
    }

    /* ── Chat container ──────────────────────────────────────────────────── */
    #chat-container {
      width: 100%;
      max-width: 780px;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 16px;
      min-height: 0; /* allows flex child to scroll */
    }

    /* ── Messages area ───────────────────────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 0 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    /* Each message row */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    .msg-row.user  { flex-direction: row-reverse; }
    .msg-row.bot   { flex-direction: row; }

    /* Avatar circle */
    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .7rem;
      font-weight: 700;
      flex-shrink: 0;
      color: #fff;
    }

    .msg-row.user .avatar { background: #c05200; }   /* orange — user */
    .msg-row.bot  .avatar { background: #4a90d9; }   /* blue — bot   */

    /* Bubble */
    .bubble {
      max-width: 72%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: .9rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* User bubble — orange tones */
    .msg-row.user .bubble {
      background: #c05200;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    /* Bot bubble — light blue */
    .msg-row.bot .bubble {
      background: #ddeeff;
      color: #1a1a2e;
      border-bottom-left-radius: 4px;
    }

    /* Typing indicator — three animated dots */
    .typing .bubble {
      background: #ddeeff;
      padding: 12px 16px;
    }

    .dots span {
      display: inline-block;
      width: 6px;
      height: 6px;
      margin: 0 2px;
      border-radius: 50%;
      background: #1a5fa8;   /* darker blue for sufficient contrast on #ddeeff */
      animation: bounce .9s infinite;
    }

    .dots span:nth-child(2) { animation-delay: .15s; }
    .dots span:nth-child(3) { animation-delay: .3s;  }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%            { transform: translateY(-6px); }
    }

    /* Error bubble */
    .bubble.error {
      background: #fde8e8;
      color: #b91c1c;
      border: 1px solid #f9a8a8;
    }

    /* ── Input row ───────────────────────────────────────────────────────── */
    #input-row {
      display: flex;
      gap: 8px;
      padding: 12px 0 16px;
      border-top: 1px solid #d1d5db;
    }

    #question {
      flex: 1;
      padding: 10px 14px;
      font-size: .9rem;
      border: 1px solid #d1d5db;
      border-radius: 24px;
      outline: none;
      resize: none;
      max-height: 120px;
      font-family: inherit;
      transition: border-color .2s;
    }

    #question:focus { border-color: #4a90d9; }

    #send-btn {
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 50%;
      background: #c05200;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .2s, opacity .2s;
      align-self: flex-end;
    }

    #send-btn:hover:not(:disabled) { background: #a34400; }
    #send-btn:disabled { opacity: .45; cursor: not-allowed; }
  </style>
</head>
<body>

<header>
  <!-- Headset icon -->
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff"
       stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
    <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z"/>
    <path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
  </svg>
  <h1>Enquiry Hub Assistant</h1>
  <span class="subtitle">Staff use only</span>
</header>

<div id="chat-container">
  <div id="messages">
    <!-- Welcome message injected by JS on load -->
  </div>

  <div id="input-row">
    <textarea
      id="question"
      rows="1"
      placeholder="Ask about recent enquiries…"
      aria-label="Your question"
    ></textarea>
    <button id="send-btn" aria-label="Send">
      <!-- Send arrow icon -->
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<script>
  // ── Configuration ────────────────────────────────────────────────────────
  // Relative URL — SWA proxies /api/* to the linked Function App server-side.
  // No API keys or credentials are needed in browser code.
  const CHAT_ENDPOINT = "/api/chat";

  // ── DOM references ────────────────────────────────────────────────────────
  const messagesEl  = document.getElementById("messages");
  const questionEl  = document.getElementById("question");
  const sendBtn     = document.getElementById("send-btn");

  // ── Message helpers ───────────────────────────────────────────────────────

  /**
   * Append a message bubble to the messages area.
   * @param {"user"|"bot"} role
   * @param {string} text  — plain text content
   * @param {boolean} isError — render as an error bubble
   * @returns {HTMLElement} the bubble element (useful for updating typing indicator)
   */
  function appendMessage(role, text, isError = false) {
    const row    = document.createElement("div");
    row.className = `msg-row ${role}`;

    const avatar  = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = role === "user" ? "You" : "AI";

    const bubble  = document.createElement("div");
    bubble.className = "bubble" + (isError ? " error" : "");
    bubble.textContent = text;

    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollToBottom();
    return bubble;
  }

  /** Show an animated typing indicator and return a function to remove it. */
  function showTyping() {
    const row    = document.createElement("div");
    row.className = "msg-row bot typing";

    const avatar  = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = "AI";

    const bubble  = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML  = '<div class="dots"><span></span><span></span><span></span></div>';

    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollToBottom();

    // Return a cleanup function so the caller can remove the indicator
    return () => messagesEl.removeChild(row);
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // ── Auto-resize textarea ──────────────────────────────────────────────────
  questionEl.addEventListener("input", () => {
    questionEl.style.height = "auto";
    questionEl.style.height = Math.min(questionEl.scrollHeight, 120) + "px";
  });

  // ── Send on Enter (Shift+Enter for newline) ───────────────────────────────
  questionEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener("click", sendMessage);

  // ── Core send function ────────────────────────────────────────────────────

  async function sendMessage() {
    const question = questionEl.value.trim();
    if (!question) return;

    // Render user bubble and clear input
    appendMessage("user", question);
    questionEl.value = "";
    questionEl.style.height = "auto";

    // Disable input while waiting for the response
    setInputEnabled(false);
    const removeTyping = showTyping();

    try {
      const response = await fetch(CHAT_ENDPOINT, {
        method:  "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ question }),
      });

      removeTyping();

      if (!response.ok) {
        // Surface the HTTP status so the user knows whether it's auth vs server error
        const detail = await response.text().catch(() => "");
        appendMessage(
          "bot",
          `Request failed (HTTP ${response.status})${detail ? ": " + detail : ""}. Please try again.`,
          /* isError */ true,
        );
        return;
      }

      const data = await response.json();
      appendMessage("bot", data.answer ?? "(no answer returned)");

    } catch (err) {
      // Network error (offline, CORS, DNS failure, etc.)
      removeTyping();
      appendMessage(
        "bot",
        "Could not reach the server. Check your network connection and try again.",
        /* isError */ true,
      );
      console.error("Chat request failed:", err);
    } finally {
      setInputEnabled(true);
      questionEl.focus();
    }
  }

  function setInputEnabled(enabled) {
    questionEl.disabled = !enabled;
    sendBtn.disabled    = !enabled;
  }

  // ── Welcome message ───────────────────────────────────────────────────────
  appendMessage(
    "bot",
    "Hello! I can answer questions about recent customer enquiries — " +
    "for example: \"How many critical enquiries were received today?\" or " +
    "\"List all open complaints.\" How can I help?",
  );

  questionEl.focus();
</script>
</body>
</html>
